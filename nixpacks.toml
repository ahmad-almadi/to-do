[phases.setup]
nixPkgs = ["nodejs_18"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = [
  "npm run build",
  "echo '=== Build complete, checking dist folder ==='",
  "ls -la",
  "ls -la dist || echo 'NO DIST FOLDER'"
]

[start]
cmd = "node server/src/db/migrate.js && node server/src/index.js"
